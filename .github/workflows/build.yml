name: Rust CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Bump Version
      id: bump
      run: |
        if [ "$GITHUB_REF" == "refs/heads/master" ] && [ "$GITHUB_EVENT_NAME" == "push" ]; then
          cargo install cargo-edit
          cargo set-version --bump patch
        fi
        NEW_VERSION=$(grep "^version" Cargo.toml | head -1 | awk -F '"' '{print $2}')
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
    - name: Upload configuration
      uses: actions/upload-artifact@v4
      with:
        name: cargo-config
        path: |
          Cargo.toml
          Cargo.lock

  build_and_test:
    name: Build on ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Download configuration
      uses: actions/download-artifact@v4
      with:
        name: cargo-config
        path: .
        
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      
    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run tests
      run: cargo test --verbose

    - name: Build release
      run: cargo build --release --verbose

    - name: Archive artifact (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path target/release/localcode.exe -DestinationPath target/release/localcode-x86_64-pc-windows-msvc.zip

    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: localcode-windows
        path: target/release/localcode-x86_64-pc-windows-msvc.zip

    - name: Archive artifact (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd target/release
        tar -czf localcode-x86_64-unknown-linux-gnu.tar.gz localcode

    - name: Upload artifact (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: localcode-ubuntu
        path: target/release/localcode-x86_64-unknown-linux-gnu.tar.gz

  release:
    name: Release to GitHub
    needs: [prepare, build_and_test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Download configuration
      uses: actions/download-artifact@v4
      with:
        name: cargo-config
        path: .
        
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: localcode-windows
        path: artifacts/

    - name: Download Ubuntu Artifact
      uses: actions/download-artifact@v4
      with:
        name: localcode-ubuntu
        path: artifacts/
        
    - name: Commit and Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add Cargo.toml Cargo.lock
        git commit -m "chore: release v${{ needs.prepare.outputs.version }} [skip ci]"
        git push
        
        git tag "v${{ needs.prepare.outputs.version }}"
        git push origin "v${{ needs.prepare.outputs.version }}"
        
    - name: Prepare Assets
      run: |
        # Ensure files are properly structured for release
        mv artifacts/localcode-windows.zip artifacts/localcode-x86_64-pc-windows-msvc.zip 2>/dev/null || true
        mv artifacts/localcode-ubuntu.tar.gz artifacts/localcode-x86_64-unknown-linux-gnu.tar.gz 2>/dev/null || true
        
    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "v${{ needs.prepare.outputs.version }}" \
          --title "Release v${{ needs.prepare.outputs.version }}" \
          --generate-notes \
          artifacts/localcode-x86_64-pc-windows-msvc.zip \
          artifacts/localcode-x86_64-unknown-linux-gnu.tar.gz
